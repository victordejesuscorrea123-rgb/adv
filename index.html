    function removerAcentos(texto) {
      return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function buscarAluno() {
      const busca = document.getElementById("buscarNome").value;
      const resultado = document.getElementById("resultado");

      resultado.innerHTML = "";

      const buscaLimpa = removerAcentos(busca.toLowerCase());

      const encontrados = alunos.filter(a =>
        removerAcentos(a.nome.toLowerCase()).includes(buscaLimpa)
      );

      if (encontrados.length > 0) {
        encontrados.forEach(aluno => {
          const li = document.createElement("li");
          li.textContent = aluno.nome + " - Turma " + aluno.turma;
          resultado.appendChild(li);
        });
      } else {
        resultado.innerHTML = "<li>Aluno não encontrado </li>";
      }
    }
